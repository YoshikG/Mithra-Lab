kind = "web"
previewPath = "/"
title = "Mithra Diagnostics"
version = "1.0.0"
id = "artifacts/mithra-diagnostics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25503

[services.development]
run = "pnpm --filter @workspace/mithra-diagnostics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mithra-diagnostics", "run", "build" ]
publicDir = "artifacts/mithra-diagnostics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25503"
BASE_PATH = "/"
